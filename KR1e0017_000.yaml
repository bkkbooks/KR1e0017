body:
  text: 春秋年表春秋類提要臣等謹案春秋年表一卷不著撰人名氏陳振孫書録解題云春秋二十國年表一卷不知何人作自周而下次以魯蔡曹衛滕晉鄭齊秦楚宋把陳吳越邾莒薛小邾館閣書目有年表二卷元豐中楊彥齡撰自周之外凡十三國又董氏藏書志有年表無撰人自周至吳越凡十國征伐朝覲㑹同皆書今此表正二十國與書録解題所載同蓋即陳振孫所見也其書在宋本自單行嶽珂雕印九經乃以附春秋之後珂記云春秋年表今諸本或闕號名或紊年月參之經傳多有舛錯今皆為刋正諸國君卒與立皆書惟魯闕今依經傳添補廖本無年表歸一圖今既刋公榖并補二書以附經傳之後是此書經珂刋補與馮繼先之名號歸一圖同刻者通志堂經解不考嶽珂之語乃與名號歸一圖連為一書亦以為馮繼先所撰誤之甚矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f54a11907f4a4a6435bf44a1437376c06cf0d230e151f72b2cad1cd98fa904ef
